<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Surprise</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:10px 20px;
font-size:18px;
background:#ff4081;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#gift1,#gift2{
display:none;
font-size:90px;
cursor:pointer;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

#letter{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px pink;
}

#slideshow{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#slideshow img{
width:320px;
border-radius:15px;
}

canvas{
position:absolute;
top:0;
left:0;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<audio id="song" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="container" id="namePage">
<h1>Enter your name 💖</h1>
<input type="text" id="username">
<br><br>
<button onclick="start()">Start</button>
</div>

<div class="container" id="gift1">🎁</div>

<div id="letter">
<h2>
Happy Birthday 💖<br><br>
The bond chosen by God.<br>
Happy birthday amma chitti chelli<br>
Thanks for believing me in every situation<br>
Missing you badly<br>
Our bond forever ❤️
</h2>
</div>

<div class="container" id="gift2">🎁</div>

<div id="slideshow">
<img id="slide" src="img1.jpg">
</div>

<script>

function start(){
document.getElementById("namePage").style.display="none";
document.getElementById("gift1").style.display="block";
document.getElementById("song").play();
}

document.getElementById("gift1").onclick=function(){
this.style.display="none";
document.getElementById("letter").style.display="block";

setTimeout(()=>{
document.getElementById("letter").style.display="none";
document.getElementById("gift2").style.display="block";
},3000);
}

document.getElementById("gift2").onclick=function(){
this.style.display="none";
document.getElementById("slideshow").style.display="block";
startSlideshow();
}

var images=[
"img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg",
"img6.jpg","img7.jpg","img8.jpg","img9.jpg",
"img10.jpg","img11.jpg","img12.jpg","img13.jpg",
"img14.jpg","img15.jpg","img16.jpg","img17.jpg","img18.jpg"
];

let i=0;

function startSlideshow(){
setInterval(()=>{
i++;
if(i>=images.length)i=0;
document.getElementById("slide").src=images[i];
},1500);
}

/* fireworks */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function fire(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;
for(let i=0;i<40;i++){
particles.push({
x,y,
dx:(Math.random()-0.5)*5,
dy:(Math.random()-0.5)*5,
life:80
});
}
}

function animate(){
requestAnimationFrame(animate);
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0)particles.splice(index,1);
});
}

setInterval(fire,1000);
animate();

</script>

</body>
</html>
